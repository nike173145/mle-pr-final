groups:
  - name: bank-api-availability
    rules:
      - alert: BankApiUnavailable
        expr: up{job="bank-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Bank recommendation API is unavailable
          description: Prometheus has not scraped the bank API for more than two minutes.

      - alert: BankApiHighErrorRate
        expr: |
          (
            (sum(rate(bank_api_requests_total{status_code=~"5.."}[5m])) or vector(0))
            /
            clamp_min(sum(rate(bank_api_requests_total[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Elevated 5xx response rate
          description: More than 5% of bank API responses have been 5xx for ten minutes.

      - alert: BankApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(bank_api_request_duration_seconds_bucket{endpoint="/predict"}[5m])
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Elevated API p95 latency
          description: The p95 request duration has exceeded one second for ten minutes.

      - alert: ObservabilityServiceUnavailable
        expr: up{job=~"mlflow|grafana"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: An observability service is unavailable
          description: Prometheus cannot scrape {{ $labels.job }} for more than five minutes.

      - alert: BankApiHighMemoryUsage
        expr: process_resident_memory_bytes{job="bank-api"} > 1073741824
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Elevated API resident memory usage
          description: The API process has used more than 1 GiB of resident memory for fifteen minutes.

  - name: bank-api-model
    rules:
      - alert: BankApiPredictionsStopped
        expr: |
          (sum(increase(bank_api_requests_total{endpoint="/predict"}[15m])) > 0)
          and
          (sum(increase(bank_predictions_total[15m])) == 0)
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: API receives traffic but emits no predictions
          description: Requests are being served, but no model predictions have been recorded.

      - alert: BankApiSuspiciousAgeP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(bank_input_age_bucket[30m]))
          ) > 100
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Suspicious input age distribution
          description: The rolling p95 age is above 100; validate input data and possible drift.
