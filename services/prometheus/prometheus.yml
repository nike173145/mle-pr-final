global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: bank-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: bank-product-api

  - job_name: mlflow
    metrics_path: /metrics
    static_configs:
      - targets:
          - mlflow:5000

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
